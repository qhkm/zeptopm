name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Build, Test, Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      # ZeptoKernel is a sibling repo — clone it for path deps
      - name: Clone ZeptoKernel
        run: git clone --depth 1 https://github.com/qhkm/zeptokernel.git ../zeptokernel

      # ZeptoClaw is a sibling repo — clone it for path deps
      - name: Clone ZeptoClaw
        run: git clone --depth 1 https://github.com/qhkm/zeptoclaw.git ../zeptoclaw

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Build
        run: cargo build

      - name: Test
        run: cargo test
