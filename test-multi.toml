# Multi-agent collaboration test config
[daemon]
poll_interval_ms = 5000
log_level = "info"

[[agents]]
name = "researcher"
provider = "openai"
model = "gpt-4o-mini"
system_prompt = "You are a research assistant. Keep answers under 2 sentences."
auto_start = true

# Gateway: public endpoint with API key auth + rate limiting
[agents.gateway]
enabled = true
api_key = "test-key-researcher-123"
rate_limit = 10

[[agents]]
name = "coder"
provider = "openai"
model = "gpt-4o-mini"
system_prompt = "You are a coding assistant. Keep answers under 2 sentences."
auto_start = true

# Gateway: public endpoint, no auth (open access), rate limited
[agents.gateway]
enabled = true
rate_limit = 5

[[agents]]
name = "writer"
provider = "openai"
model = "gpt-4o-mini"
system_prompt = "You are a creative writer. Keep answers under 3 sentences."
auto_start = true

# No gateway — internal only

[[agents]]
name = "manager"
provider = "openai"
model = "gpt-4o-mini"
system_prompt = """You are a project manager who coordinates other AI agents.

You can delegate work using: @delegate(agent_name): your question
Available agents: researcher, coder, writer

After receiving results, provide a final cohesive answer."""
auto_start = true

[providers.openai]
api_key = "$OPENAI_API_KEY"
